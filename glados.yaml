name: Glados

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

jobs:
  coding-style-check:
    name: CDS Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell/actions/setup@v2
        with:
          ghc-version: latest
          cabal-version: latest

      - name: Run coding style check
        run: |
          chmod +x ./lambananas
          ./lambdananas

  build:
    name: Compile Glados
    runs-on: ubuntu-latest
    needs: coding-style-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell/actions/setup@v2
        with:
          ghc-version: latest
          stack-version: latest

      - name: Run Glados
        run: make re
